name: Font Conversion Pipeline

on:
  push:
    paths:
      - "fonts/**"
  workflow_dispatch:

jobs:
  build-fonts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fonttools gftools fontmake

      # Slice variable font into static instances
      - name: Generate static TTFs from variable font
        run: |
          mkdir -p build/static
          gftools instancer fonts/BeVietnamPro-VariableFont_wght.ttf wght=400 ital=0 --output build/static

      # Convert static TTFs to WOFF/WOFF2
      - name: Convert static TTFs to webfonts
        run: |
          mkdir -p build/web
          for f in build/static/*.ttf; do
            pyftsubset "$f" \
              --output-file="build/web/$(basename $f .ttf).woff2" \
              --flavor=woff2 \
              --layout-features='*' \
              --glyphs='*'
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fonts
          path: build/
